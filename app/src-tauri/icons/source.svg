<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Исходник иконки. Заменить логотип: правим этот файл и запускаем
       `npx tauri icon src-tauri/icons/source.svg` из app/. -->
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f2e8"/>
      <stop offset="1" stop-color="#e8dfcc"/>
    </linearGradient>
  </defs>
  <!-- бумажная плашка -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#paper)"/>
  <rect x="64" y="64" width="896" height="896" rx="200" fill="none" stroke="#d8cdb4" stroke-width="8"/>
  <!-- буква F (чернила), собрана из прямоугольников -->
  <g fill="#221f1a">
    <rect x="308" y="272" width="96" height="480" rx="18"/>
    <rect x="308" y="272" width="368" height="96" rx="18"/>
    <rect x="308" y="452" width="280" height="96" rx="18"/>
  </g>
  <!-- курсоры соавторов -->
  <g>
    <rect x="716" y="440" width="16" height="150" rx="8" fill="#0e9a94"/>
    <rect x="716" y="404" width="76" height="40" rx="12" fill="#0e9a94"/>
    <rect x="652" y="622" width="16" height="130" rx="8" fill="#e05a41"/>
    <rect x="652" y="586" width="76" height="40" rx="12" fill="#e05a41"/>
  </g>
</svg>
